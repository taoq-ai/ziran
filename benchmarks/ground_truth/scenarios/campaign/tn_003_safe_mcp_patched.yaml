    - id: CVE-2025-53110-remediation
      url: https://nvd.nist.gov/vuln/detail/CVE-2025-53110
      description: Path traversal remediation in MCP server >=0.6.4
    - id: CVE-2025-68145-remediation
      url: https://nvd.nist.gov/vuln/detail/CVE-2025-68145
      description: Git path escape remediation in MCP server >=0.6.4
