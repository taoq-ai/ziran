# TEMPORARY smoke check (spec 024): verify ui/ builds with the refreshed lockfile
# (vite 7.3.5 / react-router 7.18). Removed after it runs once.
name: _smoke-frontend-build
on:
  push:
    branches: [024-security-alert-remediation]
    paths: [.github/workflows/_smoke-frontend-build.yml]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install (from lockfile)
        working-directory: ui
        run: npm ci
      - name: Build
        working-directory: ui
        run: npm run build
