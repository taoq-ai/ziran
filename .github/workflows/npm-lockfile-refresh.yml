# TEMPORARY one-shot workflow (spec 024 T009, #330): refresh ui/package-lock.json
# in an environment with npm-registry access (the dev machine is proxy-blocked).
# Removed once it has run.
name: npm-lockfile-refresh
on:
  workflow_dispatch:
  push:
    branches: [024-security-alert-remediation]
    paths: [.github/workflows/npm-lockfile-refresh.yml]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 024-security-alert-remediation

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: npm update + audit fix
        working-directory: ui
        run: |
          npm update
          npm audit fix || true
          echo "--- audit after ---"
          npm audit --audit-level=high || true

      - name: Commit refreshed lockfile
        run: |
          if git diff --quiet ui/package-lock.json; then
            echo "No lockfile changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add ui/package-lock.json
            git commit -m "fix(security): refresh ui/package-lock.json via CI (spec 024 T009, #330)"
            git push origin HEAD:024-security-alert-remediation
          fi
