name: Detection Accuracy

# Regression gate for spec 021 (issue #279). This job ALWAYS runs so it can be a
# required status check without deadlocking branch protection: a path-filtered
# required check never reports on unrelated PRs and blocks merge forever. Instead
# the job runs unconditionally and skips the gate (reporting success) when the
# diff does not touch detector code, the dataset, or threshold config.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  detection-accuracy-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine whether detection-relevant files changed
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            range="${base}...HEAD"
          else
            range="${{ github.event.before }}...${{ github.sha }}"
          fi
          # Fall back to "changed" if the range can't be resolved (e.g. first push).
          if ! files=$(git diff --name-only "$range" 2>/dev/null); then
            echo "relevant=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if echo "$files" | grep -qE '^(ziran/application/detectors/|benchmarks/(detection_accuracy|detection_regression|replay_llm_client)\.py|benchmarks/ground_truth/(schema\.py|detection/)|\.ziran/detectors\.yaml|benchmarks/results/detection_accuracy_baseline\.json)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        if: steps.changed.outputs.relevant == 'true'
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        if: steps.changed.outputs.relevant == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.changed.outputs.relevant == 'true'
        run: uv sync

      - name: Run detection-accuracy regression gate
        if: steps.changed.outputs.relevant == 'true'
        run: uv run python benchmarks/detection_regression.py

      - name: Skipped (no detection-relevant changes)
        if: steps.changed.outputs.relevant != 'true'
        run: echo "No detector/dataset/threshold changes — gate skipped, reporting success."
