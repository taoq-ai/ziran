# Example GitHub Actions workflow for MCP registry drift monitoring.
#
# This workflow runs `ziran watch-registry` on a schedule and opens
# a GitHub issue if drift or typosquatting is detected.
#
# Prerequisites:
#   1. A registry config file committed at `.ziran/registry.yml`
#   2. ZIRAN installed in the runner (pip install ziran)

name: MCP Registry Watch

on:
  schedule:
    - cron: "0 8 * * 1-5"  # Weekdays at 08:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ziran
        run: pip install ziran

      - name: Run registry watcher
        id: watch
        continue-on-error: true
        run: |
          ziran watch-registry \
            --config .ziran/registry.yml \
            --snapshot-dir .ziran/snapshots \
            --out ./reports \
            --format json

      - name: Open issue on drift
        if: steps.watch.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(
              fs.readFileSync('reports/registry-watch-report.json', 'utf8')
            );
            const count = report.length;
            const critical = report.filter(f => f.severity === 'critical' || f.severity === 'high');
            const body = [
              `## MCP Registry Drift Detected`,
              ``,
              `**${count}** finding(s), **${critical.length}** high/critical.`,
              ``,
              `| Server | Type | Severity | Tool | Message |`,
              `|--------|------|----------|------|---------|`,
              ...report.map(f =>
                `| ${f.server_name} | ${f.drift_type} | ${f.severity} | ${f.tool_name || '-'} | ${f.message} |`
              ),
              ``,
              `> Generated by \`ziran watch-registry\`.`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[ziran] Registry drift: ${count} finding(s)`,
              body,
              labels: ['security', 'mcp-drift'],
            });

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: registry-watch-report
          path: reports/
