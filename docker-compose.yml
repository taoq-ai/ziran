services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ziran
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ziran-ui:
    build: .
    ports:
      - "8484:8484"
    environment:
      ZIRAN_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ziran
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
