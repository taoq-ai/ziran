# Expanded harmful multi-step task scenarios — AgentHarm benchmark coverage.
#
# This file extends harmful_tasks.yaml with 120 additional multi-step vectors
# to provide broader coverage across all 11 harm categories and all 10 tactics.
# Created for issue #131: Expand AgentHarm benchmark coverage.
#
# Distribution target: ~11 vectors per harm category.
# Tactics used: context_buildup, crescendo, persona_shift, distraction,
#   few_shot, refusal_suppression, hypothetical, role_play, language_switch,
#   code_mode.

vectors:
